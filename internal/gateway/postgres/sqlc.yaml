version: "2"
sql:
  - engine: postgresql
    schema:
      - ../../../extension/database/priv/migrations
    queries:
      - queries/station
      - queries/reviews
    gen:
      go:
        package: sqlcgen
        out: sqlcgen
        sql_package: database/sql
        emit_json_tags: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
