version: "2"
sql:
  - engine: postgresql
    schema:
      - ../../../extension/database/priv/migrations/000001_init_extensions.up.sql
      - ../../../extension/database/priv/migrations/000002_reviews_table.up.sql
    queries: queries/
    gen:
      go:
        package: sqlcgen
        out: sqlcgen
        sql_package: database/sql
        emit_json_tags: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
